<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KB page</title>
    <link
      rel="stylesheet"
      href="98_KB_Page_desktop.css"
      media="screen and (min-width: 768px)"
    />
    <link
      rel="stylesheet"
      href="98_KB_Page_mobile.css"
      media="screen and (max-width: 767px)"
    />
  </head>
  <body>
    <main>
      <header>
        <!-- 클릭 시 메인 페이지로 이동하는 로고 / href="#"은 임시 -->
        <section>
          <a href="#"><img src="KB.png" alt="KB로고이미지" id="main-logo" /></a>
        </section>

        <!-- 검색창 부분 -->
        <section>
          <section class="search-area">
            <form action="#" name="search-form">
              <!-- form tag 내부의 input tag 값이 서버 or 페이지로 전달됨 -->
              <!-- 단, input의 name 속성이 존재해야만 전달된다 -->
              <fieldset>
                <!-- form tag 내부에서 input을 종류별로 묶는 용도로 주로 사용 -->
                <!-- autocomplete : 자동완성기능, 기본값은 on -->
                <input
                  type="text"
                  name="query"
                  id="query"
                  placeholder="검색어를 입력해주세요"
                  autocomplete="off"
                />
                <button id="search-btn" type="submit">검색</button>
              </fieldset>
            </form>
          </section>
        </section>
        <section></section>
      </header>

      <!-- 목차 -->
      <nav>
        <ul>
          <!-- 한줄 복사 Alt + Shift + 아래방향키 -->
          <li><a href="#">K-디지털</a></li>
          <li><a href="#">프로그래밍</a></li>
          <li><a href="#">데이터 분석</a></li>
          <li><a href="#">정보 보안</a></li>
          <li><a href="#">클라우드</a></li>
        </ul>
      </nav>

      <section class="content">
        <section>
          <h1>주요 컨텐츠 작성 부분</h1>
        </section>
        <section>
          <h1>사이드 메뉴</h1>
        </section>
      </section>

      <!-- 사이트 하단 부분 -->
      <footer>
        <p>Copyright &copy; KB It's your life 606 class</p>
        <article>
          <!-- | : 버티컬바 -->
          <a href="#">프로젝트 소개</a>
          <span>|</span>
          <a href="#">이용약관</a>
          <span>|</span>
          <a href="#">개인정보처리방침</a>
          <span>|</span>
          <a href="#">고객센터</a>
        </article>
      </footer>
    </main>
  </body>
</html>
